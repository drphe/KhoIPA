// --- Dữ liệu và Biến trạng thái ---
let newsArray = [];
let appsArray = [];
let newsEditIndex = -1;
let appEditIndex = -1;
let versionEditIndex = -1;
let prefixUrl = '';
let baseData = {};
let nameUrl = '';
// Khởi tạo ngày mặc định
document.getElementById('news_date').value = new Date().toISOString().split('T')[0];
// --- Custom UI functions (Thay thế alert/confirm) ---
function showCustomAlert(message) {
    let alertBox = document.getElementById('customAlertModal');
    if (alertBox) alertBox.remove();
    alertBox = document.createElement('div');
    alertBox.id = 'customAlertModal';
    alertBox.className = 'fixed top-4 right-4 bg-red-600 text-white p-4 rounded-lg shadow-xl font-semibold opacity-0 transition-opacity duration-500 z-50';
    alertBox.textContent = message;
    document.body.appendChild(alertBox);
    setTimeout(() => {
        alertBox.classList.remove('opacity-0');
        alertBox.classList.add('opacity-100');
    }, 10); // Ngay lập tức
    setTimeout(() => {
        alertBox.classList.remove('opacity-100');
        alertBox.classList.add('opacity-0');
        setTimeout(() => alertBox.remove(), 500);
    }, 3000);
}

function showCustomConfirm(message, callback) {
    const existingModal = document.getElementById('customConfirmModal');
    if (existingModal) existingModal.remove();
    const modal = document.createElement('div');
    modal.id = 'customConfirmModal';
    modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50';
    const box = document.createElement('div');
    box.className = 'bg-white p-6 rounded-lg shadow-2xl w-80 text-center';
    const msg = document.createElement('p');
    msg.textContent = message;
    msg.className = 'mb-5 font-medium text-gray-800';
    box.appendChild(msg);
    const btnContainer = document.createElement('div');
    btnContainer.className = 'flex justify-center space-x-4';
    const btnYes = document.createElement('button');
    btnYes.textContent = 'Đồng ý Xóa';
    btnYes.className = 'btn-delete !mt-0';
    btnYes.onclick = () => {
        modal.remove();
        callback(true);
    };
    const btnNo = document.createElement('button');
    btnNo.textContent = 'Hủy';
    btnNo.className = 'btn-cancel !mt-0';
    btnNo.onclick = () => {
        modal.remove();
        callback(false);
    };
    btnContainer.appendChild(btnYes);
    btnContainer.appendChild(btnNo);
    box.appendChild(btnContainer);
    modal.appendChild(box);
    document.body.appendChild(modal);
}
// --- Chức năng Quản lý TAB ---
function showTab(tabName, element) {
    document.getElementById('newsTab').style.display = tabName === 'news' ? 'block' : 'none';

let appleData = [];

function getBundleId(searchvalue, company = "VN", device = "iPhone") {
    const media = device === 'iPad' ? 'entity=iPadSoftware' : 'media=software';
    const url = `https://itunes.apple.com/search?limit=5&country=${company}&${media}&term=${encodeURIComponent(searchvalue)}`;
    fetch(url).then(response => response.json()).then(json => {
        appleData = [];
        json.results.forEach((item, i) => {
            const appName = item.trackName;
            if (!appName) return;
            appleData.push(item);
            const version = item.version;
            const minimumOsVersion = item.minimumOsVersion;
            const dateObj = new Date(item.currentVersionReleaseDate);
            const currentVersionReleaseDate = dateObj.toLocaleDateString('en-GB', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
            const appId = item.trackId;
            const artworkUrl = item.artworkUrl100;
            const artworkUrl_l = item.artworkUrl512;
            const artistName = item.artistName;
            const bundleId = item.bundleId;
            const price = item.formattedPrice;
            const trackViewUrl = item.trackViewUrl;
            const resultHTML = `<div class="app-item">
		    <a href="${artworkUrl_l}" download="${appName}.png" target="_blank">
			<img src = "${artworkUrl}" onerror="this.onerror=null; this.src='./common/assets/img/generic_app.jpeg';"/>
		    </a>
                    <span style="overflow: hidden;text-overflow: ellipsis; width: 400px;">
                        <p><a target="_blank" href="${trackViewUrl}"><b>${appName}</b></a> - ${artistName} <b>(v${version})</b></p>
                        <p><a id="app_${appId}" class="bundleid" data-text="${bundleId}">${bundleId}</a></p>
              		<p class="minimumOsVersion">Yêu cầu: ${minimumOsVersion} trở lên (${price})</p>
              		<p class="currentVersionReleaseDate">Cập nhật: ${currentVersionReleaseDate}</p>
                    </span>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="showConfirm(${i})">Chèn</button>
                    </div></div>
                `;
            results.insertAdjacentHTML("beforeend", resultHTML);
        });
    }).catch(error => {
        console.error("Lỗi khi gọi API:", error);
    });
}

function insertApps(d) {
    document.getElementById('customConfirm').style.display = 'none';

    };
    const clearFields = () => {
        ['app_bundleIdentifier', 'app_developerName', 'app_iconURL', 'app_localizedDescription', 'app_screenshotURLs'].forEach(id => setValue(id, ''));
    };
    const fillInfo = () => {
        setValue('app_bundleIdentifier', appDataToGet.bundleId);
        setValue('app_developerName', appDataToGet.artistName);
        setValue('app_iconURL', appDataToGet.artworkUrl100);
    };
    const fillDescription = () => {
        setValue('app_localizedDescription', `Yêu cầu: IOS ${appDataToGet.minimumOsVersion} trở lên \n${appDataToGet.description}`);
    };
    const fillScreenshots = () => {
        const newValue = appDataToGet.screenshotUrls.join(", ").trim();
        if (newValue) setValue('app_screenshotURLs', newValue);
    };
    switch (d) {
        case 'info':
            fillInfo();
            break;
        case 'description':
            fillDescription();
            break;
        case 'screenshort':
            fillScreenshots();
            break;
        case 'all':
            fillInfo();
            fillDescription();
            setValue('app_screenshotURLs', appDataToGet.screenshotUrls.join(", "));

function addOrUpdateVersion() {
    if (appEditIndex < 0) {
        window.showUIAlert("Notification", "Vui lòng chọn hoặc thêm App trước khi thêm Version.");
        return;
    }
    const version = document.getElementById('version_number').value.trim();
    const dateInput = document.getElementById('version_date').value;
    const size = parseInt(document.getElementById('version_size').value, 10);
    const downloadURL = document.getElementById('version_downloadURL').value.trim();
    const localizedDescription = document.getElementById('version_localizedDescription').value.trim();
    if (!version || !dateInput || isNaN(size) || size <= 0 || !downloadURL) {
        window.showUIAlert("Notification", "Vui lòng điền đầy đủ thông tin Version bắt buộc (Version, Ngày, Kích thước > 0, Download URL).");
        return;
    }
    // Chuyển date/time local sang chuỗi ISO 8601
    const date = new Date(dateInput).toISOString().replace(/\.\d{3}Z$/, 'Z');
    const versionItem = {
        version,
        date,
        size,
        downloadURL,
        localizedDescription
    };
    let currentApp = appsArray[appEditIndex];
    currentApp.versions = currentApp.versions || [];
    if (versionEditIndex >= 0) {
        currentApp.versions[versionEditIndex] = versionItem;
    } else {
        currentApp.versions.push(versionItem);
    }
    // Cập nhật thông tin app với version mới nhất
    appsArray[appEditIndex] = updateAppLatestVersion(currentApp);
    clearVersionForm();
    renderVersionList(appsArray[appEditIndex].versions);
    renderAppList();
    updateOutput();
}

function updateAppLatestVersion(app) {
    if ((app.versions || []).length > 0) {
        // Sắp xếp để tìm version mới nhất
        app.versions.sort((a, b) => new Date(b.date) - new Date(a.date));
        const latestVersion = app.versions[0];
        app.version = latestVersion.version;
        app.versionDate = latestVersion.date;
        app.versionDescription = latestVersion.localizedDescription;
        app.downloadURL = latestVersion.downloadURL;
        app.size = latestVersion.size;
    }
    return app;
}

     function consolidateApps(source) { // sắp xếp lại dữ liệu
       const uniqueAppsMap = new Map();
       source.apps.forEach(app => {
         const bundleID = app.bundleIdentifier;
         // Tạo đối tượng phiên bản để gộp
         const firstVersion = app.versions?.[0] ?? {};
         const appDate = normalizeDateFormat(app.versionDate ?? firstVersion.date ?? "2025-01-01");
         const versionInfo = {
           version: app.version ?? firstVersion.version ?? "1.0.0",
           date: appDate,
           size: app.size ?? firstVersion.size ?? 0,
           downloadURL: app.downloadURL ?? firstVersion.downloadURL ?? "",
           localizedDescription: app.localizedDescription ?? firstVersion.localizedDescription ?? ""
         };
         if (uniqueAppsMap.has(bundleID)) {
           const existingApp = uniqueAppsMap.get(bundleID);
           if (appDate > existingApp.versionDate) {
             existingApp.versionDate = appDate;
             existingApp.version = app.version ?? firstVersion.version ?? "1.0.0";
             existingApp.downloadURL = app.downloadURL ?? firstVersion.downloadURL ?? "";
             existingApp.size = app.size ?? firstVersion.size ?? 0;
             existingApp.localizedDescription = app.localizedDescription ?? "";
           }
           existingApp.versions.push(versionInfo);
         } else {
           // Trường hợp duy nhất: Tạo đối tượng mới và thêm vào Map
           const newApp = {
             // Sao chép tất cả các trường không phải phiên bản
             beta: app.beta ?? false,
             name: app.name,
             type: app.type ?? 1,
             bundleIdentifier: app.bundleIdentifier,
             developerName: app.developerName ?? "",
             subtitle: app.subtitle ?? "",
             localizedDescription: app.localizedDescription ?? "",
             versionDescription: app.versionDescription ?? "",
             tintColor: app.tintColor ?? "00adef",
             iconURL: app.iconURL ?? "./common/assets/img/generic_app.jpeg",
             screenshotURLs: app.screenshotURLs ?? [],
	     screenshots : app.screenshots ?? [],
             appPermissions: app.appPermissions ?? {"entitlements": [],"privacy": {}},
             size: app.size ?? firstVersion.size ?? 0,
             version: app.version ?? firstVersion.version ?? "1.0.0",
             versions: app.versions ?? [versionInfo] ?? [],
             versionDate: appDate,
             downloadURL: app.downloadURL ?? firstVersion.downloadURL ?? "",
	     patreon:app.patreon ?? {}
           };
           uniqueAppsMap.set(bundleID, newApp);
         }
       });
       // max 5 versions
       const consolidatedApps = Array.from(uniqueAppsMap.values());
       const MAX_VERSIONS = 5;
       consolidatedApps.forEach(app => {
         if (app.versions.length > MAX_VERSIONS) {
           app.versions = app.versions.slice(0, MAX_VERSIONS);
         }
       });

       const newSource = {
         ...source,
         apps: consolidatedApps
       };
        newSource.META ||= {repoName: newSource.name,repoIcon: newSource.iconURL};
        newSource.sourceImage ||= newSource.iconURL;
        newSource.sourceURL ||= "https://drphe.github.io/KhoIPA/upload/";
       return newSource;
     }

function normalizeDateFormat(dateStr) {
    const dmyRegex = /^(\d{1,2})-(\d{1,2})-(\d{4})$/; // dd-mm-yyyy
    const ymdRegex = /^(\d{4})-(\d{1,2})-(\d{1,2})$/; // yyyy-mm-dd
    if (dmyRegex.test(dateStr)) {
        const [, day, month, year] = dateStr.match(dmyRegex);
        const dd = day.padStart(2, '0');
        const mm = month.padStart(2, '0');
        return `${year}-${mm}-${dd}`;
    } else if (ymdRegex.test(dateStr)) {
        const [, year, month, day] = dateStr.match(ymdRegex);
        const dd = day.padStart(2, '0');
        const mm = month.padStart(2, '0');
        return `${year}-${mm}-${dd}`;
    } else {
        return dateStr; // không hợp lệ
    }
}

function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const importedData = JSON.parse(e.target.result);
            if (!importedData || !Array.isArray(importedData.news) || !Array.isArray(importedData.apps)) {
                window.showUIAlert("Error", "Lỗi Import: File JSON không hợp lệ hoặc thiếu mảng 'news'/'apps'.");
                return;
            }
            // Cập nhật dữ liệu toàn cục
            baseData = consolidateApps(importedData);
            newsArray = baseData.news;
            appsArray = baseData.apps;
            // Gán lại references trong baseData
            baseData.featuredApps = Array.isArray(baseData.featuredApps) ? baseData.featuredApps : [];
            baseData.news = newsArray;
            baseData.apps = appsArray;
            // Cập nhật giao diện
            renderRepo();
            renderNewsList();
            renderAppList();
            updateOutput();
            window.showUIAlert("Success", "Import file gốc thành công! Dữ liệu đã sẵn sàng để chỉnh sửa.");
            // Reset input để có thể chọn lại cùng một file
            event.target.value = '';
        } catch (error) {
            console.error("Lỗi phân tích cú pháp JSON:", error);
            window.showUIAlert("Error", "Lỗi Import: Không thể phân tích cú pháp file JSON. Vui lòng kiểm tra định dạng.");
        }
    };
    reader.readAsText(file);
}

function copyOutput() {
    const textarea = document.getElementById("output");
    textarea.select();
    textarea.setSelectionRange(0, 99999); // Cho mobile
    // Dùng Clipboard API nếu có
    if (navigator.clipboard) {
        navigator.clipboard.writeText(textarea.value).then(() => alert("Đã copy nội dung!")).catch(err => alert("Không thể copy: " + err));
    } else {
        // Fallback cho trình duyệt cũ
        document.execCommand("copy");
        alert("Đã copy nội dung!");
    }
}

function downloadJSON() {
    const jsonText = document.getElementById('output').value;
    const filename = (nameUrl ?? 'repo') + '.json';
    const blob = new Blob([jsonText], {
        type: 'application/json'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
// --- Chức năng OUTPUT ---
function updateOutput() {
    // baseData.news và baseData.apps đã là tham chiếu, đảm bảo chúng trỏ đến các mảng hiện tại
    baseData.news = newsArray;
    baseData.apps = appsArray;
    document.getElementById('output').value = JSON.stringify(baseData, null, 2);
}
window.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const source = params.get("source");
    setTimeout(() => document.getElementById("loading")?.remove(), 2000);
    if (source) await fetchRepoData(source);
    else await init();

});
const getNameRepo = (url) => {
    const parts = url.split('/');
    const lastPart = parts[parts.length - 1]; // "repo.favorite.json"
    return lastPart.replace('.json', ''); // "repo.favorite"
}
async function init() {
    try {
        const editorsources = await window.json("../common/assets/json/editorsources.json");
        if (editorsources.length) {
            // alert install
            const installAppAlert = new window.UIAlert({
                title: `Which Repository?`,
                message: "Lựa chọn nguồn dữ liệu để chỉnh sửa."
            });
            for (const url of editorsources) {
                const name = await getNameRepo(url);
                if (!name) continue;
                installAppAlert.addAction({
                    title: name,
                    style: 'default',
                    handler: () => fetchRepoData(url)
                });
            }
            installAppAlert.addAction({
                title: "Cancel",
                style: 'cancel',
            });
            installAppAlert.present()
        }
    } catch (error) {
        window.showUIAlert("Error", "Lỗi khi tải nguồn Repository!");
    }
}
// khởi tạo
async function fetchRepoData(url) {
    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
        }
        // Cập nhật dữ liệu toàn cục
        baseData = await response.json();
        prefixUrl = url;
        let button = document.querySelector(".back-button");
        button.href = `./view/?source=${window.base64Convert(prefixUrl)}`;
        nameUrl = getNameRepo(url);
        newsArray = baseData.news;
        appsArray = baseData.apps;
        baseData.featuredApps = Array.isArray(baseData.featuredApps) ? baseData.featuredApps : [];
        // Gán lại references trong baseData
        baseData.news = newsArray;
        baseData.apps = appsArray;
        baseData.sourceURL = url;
        // Cập nhật giao diện
        renderRepo();
        clearNewsForm();
        renderNewsList();
        renderAppList();
        updateOutput();
        window.showUIAlert("Success", "Repository được tải thành công!");
    } catch (error) {
        window.showUIAlert("Error", "Lỗi khi tải Repository!");
    }
}


/// Chức năng scan file IPA
function scanIpa(isFirst = true) { // hàm khi chọn file
    // Tạo input tạm thời
    const input = document.createElement('input');
    input.type = 'file';
    input.style.display = 'none'; // Ẩn input
    input.accept = '.ipa';
    // Gắn sự kiện khi người dùng chọn file
    input.addEventListener('change', function(event) {
        ;
        const file = event.target.files[0];
        if (file && file.name.endsWith(".ipa")) {
            readIpa(file, isFirst); // chuyển hàm đọc file
        } else {
            alert("Vui lòng chọn file có định dạng .ipa");
        }
        // Xóa input sau khi dùng xong
        document.body.removeChild(input);
    });
    // Thêm vào DOM và kích hoạt
    document.body.appendChild(input);
    input.click();
}

// đọc nội dung file
const readIpa = async (t = {}, oo) => { // hàm đọc file
    try {
        const e = new window.AppInfoParser(t);
        try {
            const n = await e.parse();
            console.log(n); // đối tượng chưa thông tin
            const tint = await getTintColorFromIcon(n.icon);
            const modifiedDate = t.lastModifiedDate || new Date(t.lastModified);
            const localDate = new Date(modifiedDate.getTime() - (modifiedDate.getTimezoneOffset() * 70000)).toISOString().slice(0, 16);
            // tạo thông tin cần thiết
            const ipaData = {
                CFBundleDisplayName: n.CFBundleDisplayName,
                CFBundleIdentifier: n.CFBundleIdentifier,
                CFBundleName: n.CFBundleName,
                CFBundleShortVersionString: n.CFBundleShortVersionString,
                MinimumOSVersion: "Minimum IOS: " + n.MinimumOSVersion,
                TintColor: tint,
		Icon: n.icon,
                Name: t.name,
                VersionSize: t.size,
                VersionDate: localDate
            };
            await createPopup(ipaData, oo); // tạo popup
	    getBundleId(ipaData.CFBundleDisplayName);
        } catch (n) {
            return console.error(n),
                te.dialog.alert("Incorrect file format. Please make sure the file is in the right format and not damaged."), !1
        } finally {
            t.value = null
        }
    } catch (e) {
        return console.log(e),
            te.dialog.alert("Incorrect file format. Please make sure the file is in the right format and not damaged."),
            t.value = null, !1
    }
}

    overlay.innerHTML = `
    <div id="popupBox">
      <span id="closeBtn" style="float:right;cursor:pointer;font-weight:bold;color:#888;">×</span>${isAll? `

	<img src="${data.Icon}" style="width: 50px;display: flex;float: left;border-radius: 10px;margin-right: 12px;cursor: pointer;"  onclick="const a=document.createElement('a');a.href=this.src;a.download='${data.CFBundleDisplayName.replace(/\s+/g, '')}.png';a.click();document.getElementById('app_iconURL').value = 'https://drphe.github.io/KhoIPA/icon/${data.CFBundleDisplayName.replace(/\s+/g, '')}.png'">
        ${createRow("", data.CFBundleDisplayName, "app_name_ipa")}

        <button class="action-btn" onclick="insertSection('appInfo')">Chèn thông tin ứng dụng</button>
      </div>`:`

        ${createRow("Version", data.CFBundleShortVersionString, "version_number_ipa")}

// Tạo dòng thông tin có checkbox
function createRow(label, value, id) {
    return `
    <div class="info-row">
      <label>${label}: <span>${value}</span></label>
      <input type="checkbox"  id="${id}" data-label="${label}" checked data-value="${value}">
    </div>
  `;
}
// Chèn toàn bộ thông tin trong 1 section
function insertSection(sectionId) {
    const section = document.getElementById(sectionId);
    section.querySelectorAll("input[type='checkbox']").forEach(cb => {
        if (cb.checked) {
            const id = cb.id.replace("_ipa", "");
            const value = cb.getAttribute("data-value");
            document.getElementById(id).value = value;
        }
    });
}
async function getTintColorFromIcon(iconSrc) {
    return new Promise((resolve, reject) => {
        const img = document.createElement("img");
        img.src = iconSrc;
        img.crossOrigin = "anonymous";
        img.style.display = "none";
        document.body.appendChild(img);

        img.onload = () => {
            try {
                const colorThief = new ColorThief();
                const [r, g, b] = colorThief.getColor(img);

                // Chuyển RGB sang HEX
                const toHex = (c) => c.toString(16).padStart(2, '0');
                const hexColor = `#${toHex(r)}${toHex(g)}${toHex(b)}`;

                resolve(hexColor);
            } catch (err) {
                reject("Không thể lấy màu chủ đạo: " + err);
            } finally {
                img.remove();
            }
        };

        img.onerror = () => {
            img.remove();
            reject("Lỗi khi tải ảnh.");
        };
    });
}

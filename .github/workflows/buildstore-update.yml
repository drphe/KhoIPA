name: Auto Update BuildStore Repo
on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC = 20:00 GMT+7
  workflow_dispatch:        # giữ lại để vẫn có thể chạy thủ công

jobs:
  update-buildstore:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './studio/package.json'
    
    - name: Install dependencies
      working-directory: ./studio
      run: |
        if [ ! -f package.json ]; then
          echo '{"dependencies": {"node-fetch": "^3.3.2", "jsdom": "^23.0.1"}}' > package.json
        fi
        npm install
    
    - name: Run buildstore.js
      working-directory: ./studio
      run: node buildstore.js
      env:
        NODE_NO_WARNINGS: 1
    
    - name: Check for changes
      id: git-check
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add -A
        git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT
    
    - name: Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      env:
        TZ: 'Asia/Ho_Chi_Minh'
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git commit -m "Auto-update BuildStore - $(date +'%Y-%m-%d %H:%M:%S') GMT+7"
        git push origin main
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: buildstore-output
        path: upload/buildstore.json
        retention-days: 7
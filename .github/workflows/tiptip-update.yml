name: Auto Update Tiptip Repo

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 20:00 GMT+7
  workflow_dispatch:

jobs:
  update-tiptip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './studio/package.json'
    
    - name: Install dependencies
      working-directory: ./studio
      run: |
        if [ ! -f package.json ]; then
          echo '{"dependencies": {"node-fetch": "^3.3.2", "jsdom": "^23.0.1"}}' > package.json
        fi
        npm install
    
    - name: Run tiptip.js
      working-directory: ./studio
      run: node tiptip.js
      env:
        NODE_NO_WARNINGS: 1
    
    - name: Check for changes
      id: git-check
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add -A
        git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT
    
    - name: Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      env:
        TZ: 'Asia/Ho_Chi_Minh'
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git commit -m "Auto-update Tiptip - $(date +'%Y-%m-%d %H:%M:%S') GMT+7"
        git push origin main
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tiptip-output
        path: upload/tiptip.json
        retention-days: 7